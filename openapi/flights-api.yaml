openapi: 3.1.0
info:
  title: Flight Price Tracker API
  version: 1.0.0
  description: |
    RESTful API for flight search and price tracking on the C3 AI Platform.

    ## Authentication

    This API uses **OAuth 2.0 Client Credentials** (RFC 6749 §4.4).
    The token endpoint is at `/{env}/{app}/oauth/token` (outside the
    `/flights` base path). See the `oauthToken` security scheme below.

    **C3 platform requirement:** The token request must include **both**
    an `Authorization: Basic` header and the credentials in the form body.
    Omitting the Basic header results in a `302` redirect instead of a token.

    See `api-contract.md` for the full integration guide, curl walkthrough,
    and client library examples.
  contact:
    name: Flight Price Tracker Team
  license:
    name: Proprietary

servers:
  - url: https://{host}/{env}/flightpricetrackerapi/flights
    description: C3 AI Platform deployment
    variables:
      host:
        default: c3azcs.c3.ai
        description: Platform hostname
      env:
        default: jchiutest18
        description: C3 environment/tenant name

security:
  - oauthBearer: []

paths:
  /searches:
    get:
      operationId: listSearches
      summary: List all flight searches
      description: Returns all searches ordered by most recently created.
      responses:
        "200":
          description: Array of flight searches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlightSearch"
              example:
                - id: seed_search_sfo_lhr
                  version: 1
                  fromAirport: SFO
                  toAirport: LHR
                  tripType: round-trip
                  outboundDate: "2026-04-19T00:00:00Z"
                  returnDate: "2026-04-29T00:00:00Z"
                  passengersAdults: 2
                  language: en-US
                  currency: USD
                  searchStatus: active
                  isTestData: true
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createSearch
      summary: Create a new flight search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchCreateInput"
            example:
              fromAirport: SFO
              toAirport: LHR
              outboundDate: "2026-04-19"
              tripType: round-trip
              returnDate: "2026-04-29"
              passengersAdults: 2
      responses:
        "200":
          description: The created search with searchStatus "active"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightSearch"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /searches/{id}:
    parameters:
      - $ref: "#/components/parameters/SearchId"

    get:
      operationId: getSearch
      summary: Get a single search by ID
      responses:
        "200":
          description: The search entity with all fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightSearch"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

    patch:
      operationId: updateSearch
      summary: Update search status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [searchStatus]
              properties:
                searchStatus:
                  type: string
                  enum: [active, disabled]
            example:
              searchStatus: disabled
      responses:
        "200":
          description: The updated search
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightSearch"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      operationId: deleteSearch
      summary: Delete a search and all its snapshots
      description: Permanently removes the search and all associated PriceSnapshot records.
      responses:
        "200":
          description: Deleted successfully (empty body)
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /searches/{id}/alert:
    parameters:
      - $ref: "#/components/parameters/SearchId"

    get:
      operationId: getAlert
      summary: Compute price trend alert
      description: |
        Analyzes the last 14 days of economy snapshots to detect price trends.
        - **Red:** 5+ of 7 current-week daily prices exceed previous week.
        - **Green:** Current week average is 20%+ lower than previous week.
        - **Grey:** Insufficient data or no significant change.
      responses:
        "200":
          description: Alert result with trend analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertResult"
              example:
                searchId: seed_search_lax_nrt
                status: green
                message: "Prices dropped 22% vs. last week"
                currentWeekAvg: 78200
                previousWeekAvg: 100300
                percentChange: -22.03
                daysRising: 1
                cheapestAirline: All Nippon Airways
                googleFlightsUrl: "https://www.google.com/travel/flights/search?tfs=..."
        "401":
          $ref: "#/components/responses/Unauthorized"

  /searches/{id}/prices:
    parameters:
      - $ref: "#/components/parameters/SearchId"

    get:
      operationId: getPrices
      summary: Price history for a search
      parameters:
        - name: seatClass
          in: query
          description: Filter by seat class. Omit to return all classes.
          required: false
          schema:
            type: string
            enum: [economy, business]
      responses:
        "200":
          description: Array of price snapshots ordered by fetchedAt ascending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceSnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /searches/{id}/latest-price:
    parameters:
      - $ref: "#/components/parameters/SearchId"

    get:
      operationId: getLatestPrice
      summary: Most recent economy snapshot
      responses:
        "200":
          description: Latest economy snapshot, or null if none exist
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PriceSnapshot"
                  - type: "null"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /searches/{id}/fetch:
    parameters:
      - $ref: "#/components/parameters/SearchId"

    post:
      operationId: triggerFetch
      summary: Trigger live price scrape
      description: |
        Scrapes Google Flights for both economy and business classes.
        Returns 0-2 snapshots depending on which seat classes succeed.
        No request body required.
      responses:
        "200":
          description: Newly fetched snapshots (0-2 items)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceSnapshot"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    oauthBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer token obtained from the OAuth 2.0 Client Credentials flow.

        **Token endpoint:** `POST /{env}/{app}/oauth/token`
        (outside the `/flights` base path — relative to the app root).

        **Required request:**
        ```
        POST /oauth/token
        Authorization: Basic base64(client_id:client_secret)
        Content-Type: application/x-www-form-urlencoded

        grant_type=client_credentials&client_id={id}&client_secret={secret}
        ```

        The C3 platform requires BOTH the Basic header AND the form body.

    oauthToken:
      type: oauth2
      description: |
        OAuth 2.0 Client Credentials grant for machine-to-machine access.
        The OAuth application must be registered in the API app's console
        with the `FlightApi.Client` UserGroup role.
      flows:
        clientCredentials:
          tokenUrl: "/{env}/flightpricetrackerapi/oauth/token"
          scopes: {}

  parameters:
    SearchId:
      name: id
      in: path
      required: true
      description: FlightSearch entity ID (e.g. `seed_search_lax_nrt`)
      schema:
        type: string
      example: seed_search_lax_nrt

  responses:
    BadRequest:
      description: Invalid request — missing required fields or invalid values
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: "fromAirport, toAirport, and outboundDate are required"
            status: 400

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error: "Search not found"
            status: 404

    Unauthorized:
      description: |
        Missing, expired, or invalid Bearer token.
        The C3 platform may return `302` (redirect to IdP) instead of `401`
        when no Authorization header is present. Clients should treat both
        302 and 401 as "re-acquire token and retry".

  schemas:
    FlightSearch:
      type: object
      required: [id, fromAirport, toAirport, tripType, outboundDate, searchStatus]
      description: |
        A tracked flight search with its criteria and status.

        **C3 serialization note:** Single-entity responses (getById, create,
        update) include a `"type": "FlightSearch"` field. Collection responses
        (listSearches) omit it. Consumers should ignore `type` during parsing.
      properties:
        type:
          type: string
          description: C3 type discriminator. Present on single-entity responses, absent on collections.
          readOnly: true
          example: FlightSearch
        id:
          type: string
          description: Unique entity identifier
          example: seed_search_sfo_lhr
        version:
          type: integer
          description: C3 entity version for optimistic locking
          readOnly: true
          example: 1
        meta:
          $ref: "#/components/schemas/Meta"
        fromAirport:
          type: string
          description: Departure airport IATA code (uppercased server-side)
          example: SFO
        toAirport:
          type: string
          description: Destination airport IATA code (uppercased server-side)
          example: LHR
        tripType:
          type: string
          enum: [one-way, round-trip]
          example: round-trip
        outboundDate:
          type: string
          format: date-time
          description: Outbound flight date (ISO 8601)
          example: "2026-04-19T00:00:00Z"
        returnDate:
          type: string
          format: date-time
          description: Return date for round-trip. Absent (not null) when not applicable.
          example: "2026-04-29T00:00:00Z"
        maxStops:
          type: integer
          description: Maximum stops allowed. Absent when unset.
        passengersAdults:
          type: integer
          default: 1
          example: 2
        language:
          type: string
          example: en-US
        currency:
          type: string
          example: USD
        searchStatus:
          type: string
          enum: [active, disabled]
          example: active
        isTestData:
          type: boolean
          example: false

    PriceSnapshot:
      type: object
      required: [id, flightSearch, seatClass, price, fetchedAt]
      description: |
        A single price data point for a flight search.
        Prices are in **cents** (integer) — divide by 100 for display.
      properties:
        type:
          type: string
          readOnly: true
          example: PriceSnapshot
        id:
          type: string
          example: seed_snap_lax_nrt_economy_83
        version:
          type: integer
          readOnly: true
        meta:
          $ref: "#/components/schemas/Meta"
        flightSearch:
          $ref: "#/components/schemas/EntityRef"
        seatClass:
          type: string
          enum: [economy, business]
          example: economy
        price:
          type: integer
          description: "Price in cents (e.g. 92148 = $921.48)"
          example: 92148
        airlineCodes:
          type: array
          items:
            type: string
          description: IATA airline codes
          example: ["NH", "AA"]
        airlineNames:
          type: array
          items:
            type: string
          example: ["All Nippon Airways", "American Airlines"]
        flightType:
          type: string
          description: "Route type: 'direct', '1 stop', '2 stops', etc."
          example: "1 stop"
        durationMinutes:
          type: integer
          description: Total flight duration in minutes. Absent when unknown.
          example: 730
        fetchedAt:
          type: string
          format: date-time
          description: When this price was scraped
          example: "2026-03-06T17:55:19Z"

    AlertResult:
      type: object
      required: [searchId, status, message]
      description: |
        Price trend analysis based on the last 14 days of economy snapshots.
      properties:
        searchId:
          type: string
          example: seed_search_lax_nrt
        status:
          type: string
          enum: [red, green, grey]
          description: |
            - `red` — 5+ of 7 current-week daily prices exceed previous week
            - `green` — current week average is 20%+ lower than previous week
            - `grey` — insufficient data or no significant change
          example: green
        message:
          type: string
          description: Human-readable alert description
          example: "Prices dropped 22% vs. last week"
        currentWeekAvg:
          type: number
          description: Average daily minimum price this week (cents)
          example: 78200
        previousWeekAvg:
          type: number
          description: Average daily minimum price last week (cents)
          example: 100300
        percentChange:
          type: number
          description: Week-over-week percent change (negative = cheaper)
          example: -22.03
        daysRising:
          type: integer
          description: Count of days where current week price > previous week
          example: 1
        cheapestAirline:
          type: string
          description: Airline name from the cheapest option in the latest snapshot
          example: All Nippon Airways
        googleFlightsUrl:
          type: string
          format: uri
          description: Pre-built Google Flights URL for this search
          example: "https://www.google.com/travel/flights/search?tfs=..."

    SearchCreateInput:
      type: object
      required: [fromAirport, toAirport, outboundDate]
      properties:
        fromAirport:
          type: string
          description: IATA airport code (uppercased server-side)
          example: SFO
        toAirport:
          type: string
          description: IATA airport code (uppercased server-side)
          example: LHR
        tripType:
          type: string
          enum: [one-way, round-trip]
          default: one-way
        outboundDate:
          type: string
          format: date
          description: ISO date (e.g. "2026-04-19")
          example: "2026-04-19"
        returnDate:
          type: string
          format: date
          description: Required when tripType is "round-trip"
          example: "2026-04-29"
        maxStops:
          type: integer
        passengersAdults:
          type: integer
          default: 1
        currency:
          type: string
          default: USD

    EntityRef:
      type: object
      description: |
        C3 foreign key reference. Always serialized as an object with only `id`.
        Never expanded to the full entity in this API's responses.
      required: [id]
      properties:
        id:
          type: string
      example:
        id: seed_search_lax_nrt

    Meta:
      type: object
      readOnly: true
      description: |
        C3 entity metadata. Consumers should treat this as opaque.
        Only `created` and `updated` are reliably useful.
      properties:
        appCode:
          type: integer
          format: int64
          description: Internal C3 application identifier
        env:
          type: string
          description: C3 environment name
        app:
          type: string
          description: C3 application name
        created:
          type: string
          format: date-time
        createdBy:
          type: string
        updated:
          type: string
          format: date-time
        updatedBy:
          type: string
        timestamp:
          type: string
          format: date-time
        fetchInclude:
          type: string
        fetchType:
          type: string

    ApiError:
      type: object
      description: Error response body returned by the API handler
      properties:
        error:
          type: string
          description: Human-readable error message
        status:
          type: integer
          description: HTTP status code
      example:
        error: "fromAirport, toAirport, and outboundDate are required"
        status: 400
